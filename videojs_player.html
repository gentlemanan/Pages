<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video.js VR Player</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/gentlemanan/UserScripts@main/res/video-js.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/gentlemanan/UserScripts@main/res/style.min.css">

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            font-family: sans-serif;
            overflow: hidden;
        }

        #setup-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #555;
            padding: 40px;
            border-radius: 8px;
            background: #222;
        }

        input[type="file"] {
            margin-top: 20px;
            color: #ccc;
        }

        #player-container {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
    </style>
</head>

<body>

    <div id="setup-container">
        <div class="upload-box">
            <h2>Video.js VR Player</h2>
            <p>Select a local video file to play</p>
            <input type="file" id="videoInput" accept="video/*">
        </div>
    </div>

    <div id="player-container">
        <video id="my-video" class="video-js skin_slate"></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/video.js@7.4.1/dist/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-vr@1.5.0/dist/videojs-vr.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gentlemanan/UserScripts@main/res/videojs-skin.min.js"></script>

    <script>
        const videoInput = document.getElementById('videoInput');
        const setupContainer = document.getElementById('setup-container');
        const playerContainer = document.getElementById('player-container');

        videoInput.addEventListener('change', function () {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                const fileURL = URL.createObjectURL(file);

                // Hide setup, show player
                setupContainer.style.display = 'none';
                playerContainer.style.display = 'block';

                const player = videojs('my-video', {
                    controls: true,
                    fill: true,
                    playbackRates: [0.5, 1, 1.5, 2],
                    userActions: { doubleClick: true },
                    controlBar: {
                        skipButtons: true,
                    },
                    inactivityTimeout: 0,
                    sources: [{
                        src: fileURL,
                        type: file.type
                    }]
                });

                player.ready(function () {
                    const v = player.tech().el();

                    // VR Auto-Detection (180° if aspect ratio is 2:1)
                    v.onloadedmetadata = function () {
                        if (v.videoWidth / v.videoHeight === 2) {
                            player.vr().setProjection('360')
                            // reload video to apply projection
                            player.reset();
                            player.src({
                                src: fileURL,
                                type: file.type
                            });
                        }
                    };
                });
            }
        });
    </script>
</body>

</html>
